<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        table td,
        canvas,
        video {
            border: 1px black solid;
            margin: 5px;
        }

        img,
        .videoPlayer {
            width: 300px;
            height: 300px;
        }
    </style>
</head>

<body>
    <h1>playing video test</h1>

    <h2>pygame-ce + opencv-python + ffmpeg + pyodide on canvas element (using setCanvas2D, check console)</h2>
    <canvas class="videoPlayer" id="canvas"></canvas>

    <h2>HTMLVideoElement (intended result, only video & no audio)</h2>
    <video muted autoplay class="videoPlayer" id="video">
        <source src="assets/video.mp4" type="video/mp4">
    </video>
</body>

<script src="https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js"></script>
<script>
    (async () => {
        const pyodide = await loadPyodide();

        let canvas = document.getElementById("canvas");
        pyodide.canvas.setCanvas2D(canvas);

        await pyodide.loadPackage([
            'numpy',
            'opencv-python',
            'pygame-ce'
        ]);

        pyodide.globals.set("baseURL", location.protocol+"//"+location.host);

        let file = await fetch("assets/video.mp4")
        let body = await file.body
        pyodide.FS.writeFile("video.mp4", body);
        console.log(pyodide.runPython(`
            from pathlib import Path
            print(Path("video.mp4").read_text())
        `));

        const main = await fetch('main.py');
        pyodide.runPython(await main.text());
        window.pyodide = pyodide;
    })();
</script>

</html>

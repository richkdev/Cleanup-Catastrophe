# copied from https://pygame-web.github.io/wiki/publishing/github.io/

name: build pygbag
on: [workflow_dispatch]

jobs:
  build-pygbag:
    name: Build for Emscripten pygbag runtime
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Checkout
        run: |
          python -m pip install pygbag
          python -m pygbag --no_opt --disable-sound-format-error --build ${{ github.workspace }}/main.py
      - name: Upload to GitHub pages branch gh-pages
        uses: JamesIves/github-pages-deploy-action@4.1.7
        with:
          branch: gh-pages
          folder: build/web

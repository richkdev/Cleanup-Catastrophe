name: build windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, leave empty for latest"
        required: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Set up dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ${{ github.workspace }}/requirements.txt

      - name: Build
        id: build
        shell: cmd
        run: |
          pyinstaller ${{ github.workspace }}/main.spec

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: game
          include-hidden-files: true
          path: dist
          if-no-files-found: error
